task: detection

model: DINOD
criterion: SetCriterion
postprocessor: RTDETRPostProcessor

DINOD:
  backbone: LoRA_DINOv2
  encoder: HybridEncoder
  decoder: RTDETRTransformer
  multi_scale: [ 480, 512, 544, 576, 608, 640, 640, 640, 672, 704, 736, 768, 800 ]

LoRA_DINOv2:
  model: s
  pretrained: True
  patch_size: 14
  pretrained_path: pretrained
  block_chunks: 0
  init_values: 1.0e-05
  drop_path_uniform: True
  img_size: 518
  feat_size: 518
  lora_r: 64
  lora_alpha: 64
  lora_dropout: 0.
  use_rslora: False
  
HybridEncoder:
  in_channels: [ 128, 256, 512 ]
  feat_strides: [ 8, 16, 32 ]

  # intra
  hidden_dim: 384
  use_encoder_idx: [ 2 ]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'
  pe_temperature: 10000

  # cross
  expansion: 1.0
  depth_mult: 1
  act: 'silu'

  # eval
  eval_spatial_size: [ 37, 37 ]

RTDETRTransformer:
  feat_channels: [ 384 ]
  feat_strides: [ 8 ]
  hidden_dim: 384
  num_levels: 1

  num_queries: 300

  num_decoder_layers: 6
  num_denoising: 100

  eval_idx: -1
  eval_spatial_size: [ 37, 37 ]

use_focal_loss: True

RTDETRPostProcessor:
  num_top_queries: 300

SetCriterion:
  weight_dict: {loss_vfl: 1, loss_bbox: 5, loss_giou: 2,}
  losses: ['vfl', 'boxes', ]
  alpha: 0.75
  gamma: 2.0

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    # use_focal_loss: True
    alpha: 0.25
    gamma: 2.0